  <!-- Yeux -->
  <ellipse cx="12.5" cy="12" rx="2.5" ry="2.8" fill="#0a0a0f"/>
  <ellipse cx="19.5" cy="12" rx="2.5" ry="2.8" fill="#0a0a0f"/>
