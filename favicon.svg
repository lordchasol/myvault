  <!-- Os croisés -->
  <line x1="7" y1="27" x2="25" y2="25" stroke="#c8f135" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="7" y1="25" x2="25" y2="27" stroke="#c8f135" stroke-width="2.2" stroke-linecap="round"/>
