  <ellipse cx="12.5" cy="12.2" rx="1.2" ry="1.4" fill="#c8f135"/>
  <ellipse cx="19.5" cy="12.2" rx="1.2" ry="1.4" fill="#c8f135"/>
  <!-- Nez -->
